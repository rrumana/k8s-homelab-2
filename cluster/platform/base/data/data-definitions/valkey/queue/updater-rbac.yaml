apiVersion: v1
kind: ServiceAccount
metadata:
  name: valkey-queue-primary-reconciler
  namespace: databases
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: valkey-queue-primary-reconciler
  namespace: databases
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["valkey-queue-rw"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: valkey-queue-primary-reconciler
  namespace: databases
subjects:
  - kind: ServiceAccount
    name: valkey-queue-primary-reconciler
    namespace: databases
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: valkey-queue-primary-reconciler
