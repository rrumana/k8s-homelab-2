apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: librechat-mongodb
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app: librechat-mongodb
spec:
  serviceName: librechat-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: librechat-mongodb
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: librechat-mongodb
    spec:
      serviceAccountName: librechat-mongodb
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongodb
          image: mongo:8.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: librechat-secret
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librechat-secret
                  key: MONGO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - |
                  mongosh --quiet \
                    --username "$MONGO_INITDB_ROOT_USERNAME" \
                    --password "$MONGO_INITDB_ROOT_PASSWORD" \
                    --authenticationDatabase admin \
                    mongodb://127.0.0.1:27017/admin \
                    --eval 'db.adminCommand({ ping: 1 }).ok' | grep -qx '1'
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - |
                  mongosh --quiet \
                    --username "$MONGO_INITDB_ROOT_USERNAME" \
                    --password "$MONGO_INITDB_ROOT_PASSWORD" \
                    --authenticationDatabase admin \
                    mongodb://127.0.0.1:27017/admin \
                    --eval 'db.adminCommand({ ping: 1 }).ok' | grep -qx '1'
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: librechat-mongodb-data
