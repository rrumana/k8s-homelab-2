global:
  imageRegistry: harbor.rcrumana.xyz/mirror
  imagePullSecrets:
    - harbor-pull-creds

fullnameOverride: valkey-cache

architecture: replication

auth:
  enabled: true
  sentinel: false
  existingSecret: valkey-cache-auth
  existingSecretPasswordKey: password

commonConfiguration: |-
  maxmemory 1gb
  maxmemory-policy allkeys-lru
  appendonly no
  save ""

sentinel:
  enabled: false

podAntiAffinityPreset: hard

networkPolicy:
  enabled: false

pdb:
  create: true
  maxUnavailable: 1

primary:
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

replica:
  replicaCount: 2
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false
