# apps/productivity/homarr/values.yaml
# Chart: homarr-labs/homarr

replicaCount: 1
strategyType: RollingUpdate

image:
  repository: harbor.rcrumana.xyz/mirror/homarr-labs/homarr
  pullSecrets:
    - name: harbor-pull-creds

podAnnotations:
  linkerd.io/inject: enabled
  config.linkerd.io/skip-outbound-ports: "6379"

env:
  TZ: America/Los_Angeles
  LOG_LEVEL: info
  REDIS_IS_EXTERNAL: "true"
  REDIS_HOST: valkey-cache-primary.databases.svc.cluster.local
  REDIS_PORT: "6379"
  REDIS_DATABASE_INDEX: "0"
  
database:
  type: postgresql

envSecrets:
  dbCredentials:
    existingSecret: homarr-helm-db-postgres
    dbUrlKey: db-url
  dbEncryption:
    existingSecret: homarr-helm-db-encryption
    key: db-encryption-key

rbac:
  enabled: true

serviceAccount:
  create: false
  name: homarr-helm

ingress:
  enabled: false
  ingressClassName: haproxy-restricted
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: homarr.k8s.rcrumana.xyz
      paths:
        - path: /
  tls:
    - secretName: homarr-k8s-rcrumana-xyz-tls
      hosts:
        - homarr.k8s.rcrumana.xyz

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 2Gi
