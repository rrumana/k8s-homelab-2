apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-prepper
  namespace: search
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: data-prepper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-prepper
    spec:
      serviceAccountName: data-prepper
      containers:
        - name: data-prepper
          image: harbor.rcrumana.xyz/mirror/opensearchproject/data-prepper:2.13.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2021
              name: http
            - containerPort: 4900
              name: metrics
          readinessProbe:
            httpGet:
              path: /list
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /list
              port: metrics
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /usr/share/data-prepper/config/data-prepper-config.yaml
              subPath: data-prepper-config.yaml
            - name: pipelines
              mountPath: /usr/share/data-prepper/pipelines/pipelines.yaml
              subPath: pipelines.yaml
      volumes:
        - name: config
          configMap:
            name: data-prepper-config
        - name: pipelines
          secret:
            secretName: data-prepper-pipeline
