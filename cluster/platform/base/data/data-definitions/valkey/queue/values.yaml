global:
  imageRegistry: harbor.rcrumana.xyz/mirror
  imagePullSecrets:
    - harbor-pull-creds

fullnameOverride: valkey-queue

architecture: replication

auth:
  enabled: true
  sentinel: false
  existingSecret: valkey-queue-auth
  existingSecretPasswordKey: password

commonConfiguration: |-
  maxmemory 2gb
  maxmemory-policy noeviction
  appendonly yes
  appendfsync everysec
  save ""

sentinel:
  enabled: false

podAntiAffinityPreset: hard

networkPolicy:
  enabled: false

pdb:
  create: true
  maxUnavailable: 1

primary:
  persistence:
    enabled: true
    storageClass: ceph-block
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

replica:
  replicaCount: 2
  persistence:
    enabled: true
    storageClass: ceph-block
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false
