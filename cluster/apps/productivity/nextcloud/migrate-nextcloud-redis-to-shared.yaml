# One-time migration job.
# Run before app cutover. Keeps source keys with COPY and replaces destination keys.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-nextcloud-redis-to-shared
  annotations:
    argocd.argoproj.io/sync-wave: "16"
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: redis:7.2-alpine
          env:
            - name: SRC_REDIS_HOST
              value: nextcloud-redis-master
            - name: SRC_REDIS_PORT
              value: "6379"
            - name: SRC_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-redis
                  key: redis-password
            - name: DST_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: nextcloud-redis-shared
                  key: host
            - name: DST_REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: nextcloud-redis-shared
                  key: port
            - name: DST_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-redis-shared
                  key: password
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              redis-cli -h "$SRC_REDIS_HOST" -p "$SRC_REDIS_PORT" -a "$SRC_REDIS_PASSWORD" --no-auth-warning PING >/dev/null
              redis-cli -h "$DST_REDIS_HOST" -p "$DST_REDIS_PORT" -a "$DST_REDIS_PASSWORD" --no-auth-warning PING >/dev/null

              echo "Migrating keys from source redis to destination redis..."
              redis-cli -h "$SRC_REDIS_HOST" -p "$SRC_REDIS_PORT" -a "$SRC_REDIS_PASSWORD" --no-auth-warning --scan \
                | while IFS= read -r key; do
                    [ -z "$key" ] && continue
                    redis-cli -h "$SRC_REDIS_HOST" -p "$SRC_REDIS_PORT" -a "$SRC_REDIS_PASSWORD" --no-auth-warning \
                      MIGRATE "$DST_REDIS_HOST" "$DST_REDIS_PORT" "" 0 10000 COPY REPLACE AUTH "$DST_REDIS_PASSWORD" KEYS "$key" >/dev/null
                  done

              echo "Nextcloud Redis migration job completed."
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "1", memory: "512Mi" }
