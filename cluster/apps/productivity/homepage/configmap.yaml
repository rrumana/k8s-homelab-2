apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  proxmox.yaml: ""
  settings.yaml: |
    headerStyle: boxed
    statusStyle: dot
    fullWidth: true
    useEqualHeights: true
    layout:
      Services:
        style: row
        columns: 5
      Torrenting:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 2
        header: false
        Networking:
          style: row
          columns: 3
        Storage:
          style: row
          columns: 3
      Kubernetes:
        style: row
        columns: 5
      Hosting:
        style: row
        columns: 3
      Misc:
        style: row
        columns: 3
  custom.css: |
    @media (min-width: 1200px) {
      div:has(> [id^="headlessui-disclosure-panel-"] > ul.services-list > #torrent-calendar) {
        grid-column: span 2 / span 2 !important;
      }

      [id^="headlessui-disclosure-panel-"]:has(> ul.services-list > #torrent-calendar) {
        overflow: visible !important;
      }

      ul.services-list:has(> #torrent-calendar) {
        display: grid !important;
        grid-template-columns: minmax(220px, 1.2fr) repeat(3, minmax(165px, 1fr)) !important;
        grid-template-areas:
          "calendar qbit qbit-lts qbit-lts2"
          "calendar sonarr radarr lidarr"
          "calendar jellyseerr prowlarr .";
        gap: 0.75rem !important;
        align-items: start !important;
      }

      ul.services-list:has(> #torrent-calendar) > li.service {
        min-width: 0;
        align-self: start !important;
        justify-self: stretch !important;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-calendar {
        grid-area: calendar !important;
        align-self: stretch !important;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-calendar > div {
        height: 100%;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-qbit {
        grid-area: qbit !important;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-qbit-lts {
        grid-area: qbit-lts !important;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-qbit-lts2 {
        grid-area: qbit-lts2 !important;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-sonarr {
        grid-area: sonarr !important;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-radarr {
        grid-area: radarr !important;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-lidarr {
        grid-area: lidarr !important;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-prowlarr {
        grid-area: prowlarr !important;
      }

      ul.services-list:has(> #torrent-calendar) > #torrent-jellyseerr {
        grid-area: jellyseerr !important;
      }
    }
  custom.js: ""
  bookmarks.yaml: |
    - Cluster:
        - GitOps Repo:
            - abbr: GIT
              href: https://github.com/rrumana/k8s-homelab-2
    - Portfolio:
        - Portfolio Repo:
            - abbr: GIT
              href: https://github.com/rrumana/portfolio
  services.yaml: |
    - Infrastructure:
        - Networking:
            - Opnsense:
                icon: si-opnsense-#d94f00
                href: https://router.rcrumana.xyz
                siteMonitor: https://router.rcrumana.xyz
                description: Router and firewall
            - Headscale:
                icon: si-tailscale-#242424
                href: https://headscale.rcrumana.xyz/web
                siteMonitor: https://headscale.rcrumana.xyz/web
                description: Tailscale control plane
            - Unifi-OS:
                icon: si-ubiquiti-#0559c9
                href: https://unifi.rcrumana.xyz
                siteMonitor: https://unifi.rcrumana.xyz
                description: Network controller
        - Storage:
            - TrueNAS:
                icon: si-truenas-#0095d5
                href: https://nas.rcrumana.xyz
                siteMonitor: https://nas.rcrumana.xyz
                description: NAS and storage management
            - Ceph:
                icon: si-ceph-#ef5c55
                href: https://ceph.rcrumana.xyz
                siteMonitor: https://ceph.rcrumana.xyz
                description: Cluster storage dashboard
            - Minio:
                icon: si-minio-#c72e49
                href: https://minio.rcrumana.xyz
                siteMonitor: https://minio.rcrumana.xyz
                description: Object storage console

    - Services:
        - Jellyfin:
            icon: si-jellyfin-#aa5cc3
            href: https://jellyfin.rcrumana.xyz
            siteMonitor: https://jellyfin.rcrumana.xyz
            description: Media streaming
            widget:
              type: jellyfin
              url: http://jellyfin.media.svc.cluster.local:8096
              key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
        - Immich:
            icon: si-immich-#4250af
            href: https://immich.rcrumana.xyz
            siteMonitor: https://immich.rcrumana.xyz
            description: Photos and memories
            widget:
              type: immich
              url: http://immich-server.media.svc.cluster.local:2283
              key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
              version: 2
        - Nextcloud:
            icon: si-nextcloud-#0082c9
            href: https://nextcloud.rcrumana.xyz
            siteMonitor: https://nextcloud.rcrumana.xyz
            description: Files and collaboration
            widget:
              type: nextcloud
              url: http://nextcloud:8080
              username: "{{HOMEPAGE_VAR_NEXTCLOUD_USERNAME}}"
              password: "{{HOMEPAGE_VAR_NEXTCLOUD_PASSWORD}}"
        - Vaultwarden:
            icon: si-bitwarden-#175ddc
            href: https://vault.rcrumana.xyz
            siteMonitor: https://vault.rcrumana.xyz
            description: Password vault
        - AI:
            icon: mdi-robot-excited-outline
            href: https://chat.rcrumana.xyz
            siteMonitor: https://chat.rcrumana.xyz
            description: LibreChat instance
    - Torrenting:
        - Calendar:
            id: torrent-calendar
            icon: mdi-calendar-month-outline
            description: Upcoming media
            widget:
              type: calendar
              firstDayInWeek: sunday
              view: monthly
              maxEvents: 100
              showTime: true
              timezone: America/Los_Angeles
              integrations:
                - type: sonarr
                  service_group: Torrenting
                  service_name: Sonarr
                  baseUrl: https://sonarr.rcrumana.xyz
                - type: radarr
                  service_group: Torrenting
                  service_name: Radarr
                  baseUrl: https://radarr.rcrumana.xyz
                - type: lidarr
                  service_group: Torrenting
                  service_name: Lidarr
                  baseUrl: https://lidarr.rcrumana.xyz
        - Qbit:
            id: torrent-qbit
            icon: si-qbittorrent-#2f67ba
            href: https://qbit.rcrumana.xyz
            siteMonitor: https://qbit.rcrumana.xyz
            description: Main torrent client
            widget:
              type: qbittorrent
              url: http://qbit.media.svc.cluster.local
              username: "{{HOMEPAGE_VAR_QBIT_USERNAME}}"
              password: "{{HOMEPAGE_VAR_QBIT_PASSWORD}}"
        - Qbit-lts:
            id: torrent-qbit-lts
            icon: si-qbittorrent-#5a7bbd
            href: https://qbit-lts.rcrumana.xyz
            siteMonitor: https://qbit-lts.rcrumana.xyz
            description: Long-term seed client
            widget:
              type: qbittorrent
              url: http://qbit-lts.media.svc.cluster.local
              username: "{{HOMEPAGE_VAR_QBIT_LTS_USERNAME}}"
              password: "{{HOMEPAGE_VAR_QBIT_LTS_PASSWORD}}"
        - Qbit-lts2:
            id: torrent-qbit-lts2
            icon: si-qbittorrent-#7d91c8
            href: https://qbit-lts2.rcrumana.xyz
            siteMonitor: https://qbit-lts2.rcrumana.xyz
            description: Secondary long-term seed client
            widget:
              type: qbittorrent
              url: http://qbit-lts2.media.svc.cluster.local
              username: "{{HOMEPAGE_VAR_QBIT_LTS2_USERNAME}}"
              password: "{{HOMEPAGE_VAR_QBIT_LTS2_PASSWORD}}"
        - Sonarr:
            id: torrent-sonarr
            icon: sonarr.png
            href: https://sonarr.rcrumana.xyz
            siteMonitor: https://sonarr.rcrumana.xyz
            description: TV automation
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
        - Radarr:
            id: torrent-radarr
            icon: radarr.png
            href: https://radarr.rcrumana.xyz
            siteMonitor: https://radarr.rcrumana.xyz
            description: Movie automation
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
        - Lidarr:
            id: torrent-lidarr
            icon: lidarr.png
            href: https://lidarr.rcrumana.xyz
            siteMonitor: https://lidarr.rcrumana.xyz
            description: Music automation
            widget:
              type: lidarr
              url: http://lidarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_LIDARR_KEY}}"
        - Prowlarr:
            id: torrent-prowlarr
            icon: prowlarr.png
            href: https://prowlarr.rcrumana.xyz
            siteMonitor: https://prowlarr.rcrumana.xyz
            description: Indexer management
            widget:
              type: prowlarr
              url: http://prowlarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
        - Jellyseerr:
            id: torrent-jellyseerr
            icon: si-jellyseerr-#ed4e7a
            href: https://jellyseerr.rcrumana.xyz
            siteMonitor: https://jellyseerr.rcrumana.xyz
            description: Request management
            widget:
              type: seerr
              url: http://jellyseerr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"

    - Kubernetes:
        - Melchior-1 CPU:
            icon: mdi-meter-electric-outline
            description: CPU usage
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_PASSWORD}}"
              version: 4
              metric: cpu
              chart: true
        - Melchior-1 Memory:
            icon: mdi-memory
            description: Memory usage
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_PASSWORD}}"
              version: 4
              metric: memory
              chart: true
        - Melchior-1 Processes:
            icon: mdi-chart-box-outline
            description: Top processes
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_PASSWORD}}"
              version: 4
              metric: process
              chart: true
        - Melchior-1 Network:
            icon: mdi-network
            description: Network traffic
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_PASSWORD}}"
              version: 4
              metric: network:enp196s0
              chart: true
        - Melchior-1 Network 2:
            icon: mdi-network-outline
            description: Network traffic
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_MELCHIOR_PASSWORD}}"
              version: 4
              metric: network:enp197s0
              chart: true
        - Balthasar-2 CPU:
            icon: mdi-meter-electric-outline
            description: CPU usage
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_PASSWORD}}"
              version: 4
              metric: cpu
              chart: true
        - Balthasar-2 Memory:
            icon: mdi-memory
            description: Memory usage
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_PASSWORD}}"
              version: 4
              metric: memory
              chart: true
        - Balthasar-2 Processes:
            icon: mdi-chart-box-outline
            description: Top processes
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_PASSWORD}}"
              version: 4
              metric: process
              chart: true
        - Balthasar-2 Network:
            icon: mdi-network
            description: Network traffic
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_PASSWORD}}"
              version: 4
              metric: network:enp196s0
              chart: true
        - Balthasar-2 Network 2:
            icon: mdi-network-outline
            description: Network traffic
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_BALTHASAR_PASSWORD}}"
              version: 4
              metric: network:enp197s0
              chart: true
        - Casper-3 CPU:
            icon: mdi-meter-electric-outline
            description: CPU usage
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_CASPER_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_CASPER_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_CASPER_PASSWORD}}"
              version: 4
              metric: cpu
              chart: true
        - Casper-3 Memory:
