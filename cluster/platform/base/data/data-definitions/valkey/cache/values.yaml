fullnameOverride: valkey-cache

architecture: replication

auth:
  enabled: true
  sentinel: true
  existingSecret: valkey-cache-auth
  existingSecretPasswordKey: password

commonConfiguration: |-
  maxmemory 1gb
  maxmemory-policy allkeys-lru
  appendonly no
  save ""

sentinel:
  enabled: true
  masterSet: valkey-cache
  quorum: 2
  downAfterMilliseconds: 5000
  failoverTimeout: 60000
  parallelSyncs: 1

podAntiAffinityPreset: hard

networkPolicy:
  enabled: false

pdb:
  create: true
  maxUnavailable: 1

primary:
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

replica:
  replicaCount: 2
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
