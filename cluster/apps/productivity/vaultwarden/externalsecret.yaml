apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-db-shared
  namespace: productivity
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: vaultwarden-db-shared
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: apps/productivity/vaultwarden-db-shared
        property: DATABASE_URL
    - secretKey: host
      remoteRef:
        key: apps/productivity/vaultwarden-db-shared
        property: host
    - secretKey: port
      remoteRef:
        key: apps/productivity/vaultwarden-db-shared
        property: port
    - secretKey: database
      remoteRef:
        key: apps/productivity/vaultwarden-db-shared
        property: database
    - secretKey: username
      remoteRef:
        key: apps/productivity/vaultwarden-db-shared
        property: username
    - secretKey: password
      remoteRef:
        key: apps/productivity/vaultwarden-db-shared
        property: password
