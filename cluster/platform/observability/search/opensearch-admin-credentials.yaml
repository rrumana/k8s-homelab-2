apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opensearch-admin-credentials
  namespace: search
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: opensearch-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: apps/search/opensearch-admin
        property: username
    - secretKey: password
      remoteRef:
        key: apps/search/opensearch-admin
        property: password
