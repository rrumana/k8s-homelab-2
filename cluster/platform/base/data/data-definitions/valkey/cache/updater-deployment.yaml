apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-cache-primary-reconciler
  namespace: databases
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey-cache-primary-reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey-cache-primary-reconciler
    spec:
      serviceAccountName: valkey-cache-primary-reconciler
      containers:
        - name: reconciler
          image: docker.io/bitnamilegacy/kubectl:1.33.4
          command:
            - /bin/bash
            - /scripts/reconcile.sh
          env:
            - name: NAMESPACE
              value: databases
            - name: POD_LABEL_SELECTOR
              value: app.kubernetes.io/instance=valkey-cache
            - name: SERVICE_NAME
              value: valkey-cache-rw
            - name: MASTER_SET
              value: valkey-cache
            - name: SENTINEL_PORT
              value: "26379"
            - name: AUTH_FILE
              value: /auth/password
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: auth
              mountPath: /auth
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: valkey-cache-primary-reconciler
            defaultMode: 0755
        - name: auth
          secret:
            secretName: valkey-cache-auth
