            description: Network traffic
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_CASPER_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_CASPER_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_CASPER_PASSWORD}}"
              version: 4
              metric: network:enp196s0
              chart: true
        - Casper-3 Network 2:
            icon: mdi-network-outline
            description: Network traffic
            widget:
              type: glances
              url: "{{HOMEPAGE_VAR_GLANCES_CASPER_URL}}"
              username: "{{HOMEPAGE_VAR_GLANCES_CASPER_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GLANCES_CASPER_PASSWORD}}"
              version: 4
              metric: network:enp197s0
              chart: true

    - Hosting:
        - Portfolio:
            icon: mdi-web
            href: https://rcrumana.xyz
            siteMonitor: https://rcrumana.xyz
            description: Primary site
        - Portfolio Staging:
            icon: mdi-flask-outline
            href: https://staging.rcrumana.xyz
            siteMonitor: https://staging.rcrumana.xyz
            description: Staging site

    - Misc:
        - Uptime Kuma:
            icon: si-uptimekuma-#5cdd8b
            href: https://uptime.rcrumana.xyz
            siteMonitor: https://uptime.rcrumana.xyz
            description: Status and alerting
        - Hypermind:
            icon: mdi-brain
            href: https://hypermind.rcrumana.xyz
            siteMonitor: https://hypermind.rcrumana.xyz
            description: Shared room and map
        - Argo CD:
            icon: si-argo-#ef7b4d
            href: https://argocd.rcrumana.xyz
            siteMonitor: https://argocd.rcrumana.xyz
            description: GitOps control plane
            widget:
              type: argocd
              url: https://argocd.rcrumana.xyz
              key: "{{HOMEPAGE_VAR_ARGOCD_KEY}}"
  widgets.yaml: |
    - openmeteo:
        units: imperial
        cache: 5
        format:
          maximumFractionDigits: 0
  docker.yaml: ""
