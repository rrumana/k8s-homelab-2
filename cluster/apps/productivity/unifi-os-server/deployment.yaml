apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-os-server
  labels:
    app: unifi-os-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi-os-server
  template:
    metadata:
      labels:
        app: unifi-os-server
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: unifi-os-server
          image: ghcr.io/lemker/unifi-os-server:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: UOS_SYSTEM_IP
              value: unifios.rcrumana.xyz
          ports:
            - name: uos-ui
              containerPort: 443
              protocol: TCP
            - name: rtp
              containerPort: 5005
              protocol: TCP
            - name: aqmps
              containerPort: 5671
              protocol: TCP
            - name: speedtest
              containerPort: 6789
              protocol: TCP
            - name: inform
              containerPort: 8080
              protocol: TCP
            - name: network-app
              containerPort: 8443
              protocol: TCP
            - name: hotspot-sec
              containerPort: 8444
              protocol: TCP
            - name: hotspot-0
              containerPort: 8880
              protocol: TCP
            - name: hotspot-1
              containerPort: 8881
              protocol: TCP
            - name: hotspot-2
              containerPort: 8882
              protocol: TCP
            - name: identity-hub
              containerPort: 9543
              protocol: TCP
            - name: discovery
              containerPort: 10003
              protocol: UDP
            - name: site-superv
              containerPort: 11084
              protocol: TCP
            - name: stun
              containerPort: 3478
              protocol: UDP
            - name: syslog
              containerPort: 5514
              protocol: UDP
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - NET_ADMIN
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: persistent
              mountPath: /persistent
            - name: var-log
              mountPath: /var/log
            - name: data
              mountPath: /data
            - name: srv
              mountPath: /srv
            - name: var-lib-unifi
              mountPath: /var/lib/unifi
            - name: var-lib-mongodb
              mountPath: /var/lib/mongodb
            - name: rabbitmq-ssl
              mountPath: /etc/rabbitmq/ssl
            # UniFi OS runs under systemd and needs writable cgroup access.
            - name: cgroup
              mountPath: /sys/fs/cgroup
      volumes:
        - name: persistent
          persistentVolumeClaim:
            claimName: unifi-os-server-persistent
        - name: var-log
          persistentVolumeClaim:
            claimName: unifi-os-server-var-log
        - name: data
          persistentVolumeClaim:
            claimName: unifi-os-server-data
        - name: srv
          persistentVolumeClaim:
            claimName: unifi-os-server-srv
        - name: var-lib-unifi
          persistentVolumeClaim:
            claimName: unifi-os-server-var-lib-unifi
        - name: var-lib-mongodb
          persistentVolumeClaim:
            claimName: unifi-os-server-var-lib-mongodb
        - name: rabbitmq-ssl
          persistentVolumeClaim:
            claimName: unifi-os-server-rabbitmq-ssl
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
