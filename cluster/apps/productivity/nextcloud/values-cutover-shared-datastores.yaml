# Cutover overrides only. Keep this file inactive until the maintenance window.
# Enable by adding it as a second Helm values file in:
# cluster/platform/gitops/argocd/apps/nextcloud-app.yaml
#
# Post-cutover cleanup (after validation):
# - Delete legacy local datastore manifests no longer needed.

externalDatabase:
  enabled: true
  type: postgresql
  host: pg-productivity-rw.databases.svc.cluster.local
  port: 5432
  database: nextcloud
  user: nextcloud
  existingSecret:
    enabled: true
    secretName: nextcloud-db-shared
    usernameKey: username
    passwordKey: password
    hostKey: host
    databaseKey: database

postgresql:
  enabled: false

redis:
  enabled: false

externalRedis:
  enabled: true
  host: redis-cache.databases.svc.cluster.local
  port: "15976"
  existingSecret:
    enabled: true
    secretName: nextcloud-redis-shared
    passwordKey: password
