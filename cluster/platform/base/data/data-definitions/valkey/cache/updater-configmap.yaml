apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey-cache-primary-reconciler
  namespace: databases
data:
  reconcile.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    while true; do
      pod="$(
        kubectl -n "${NAMESPACE}" get pods -l "${POD_LABEL_SELECTOR}" \
          --field-selector=status.phase=Running \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true
      )"

      if [[ -z "${pod}" ]]; then
        echo "no running pods matched selector ${POD_LABEL_SELECTOR}"
        sleep 10
        continue
      fi

      password="$(cat "${AUTH_FILE}")"
      master_ip="$(
        kubectl -n "${NAMESPACE}" exec "${pod}" -- sh -ec \
          'cli="$(command -v valkey-cli || command -v redis-cli || true)"; [ -n "${cli}" ] || exit 127; "${cli}" --raw -p '"${SENTINEL_PORT}"' -a '"'"${password}"'"' SENTINEL get-master-addr-by-name '"${MASTER_SET}"'' \
          | head -n1 || true
      )"

      if [[ -z "${master_ip}" ]]; then
        echo "failed to resolve master ip from sentinel via pod ${pod}"
        sleep 10
        continue
      fi

      master_pod="$(
        kubectl -n "${NAMESPACE}" get pods -l "${POD_LABEL_SELECTOR}" \
          -o jsonpath='{range .items[*]}{.status.podIP}{" "}{.metadata.name}{"\n"}{end}' \
          | awk -v ip="${master_ip}" '$1 == ip { print $2 }'
      )"

      if [[ -z "${master_pod}" ]]; then
        echo "could not map master ip ${master_ip} to a pod"
        sleep 10
        continue
      fi

      echo "patching ${SERVICE_NAME} to primary pod ${master_pod} (${master_ip})"
      kubectl -n "${NAMESPACE}" patch service "${SERVICE_NAME}" --type=merge \
        -p "{\"spec\":{\"selector\":{\"statefulset.kubernetes.io/pod-name\":\"${master_pod}\"}}}" >/dev/null

      sleep 10
    done
