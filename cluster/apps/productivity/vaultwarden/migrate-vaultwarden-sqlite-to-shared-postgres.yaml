# One-time migration job.
# Run before app cutover. Destination DB should be empty.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-vaultwarden-sqlite-to-shared-postgres
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: dimitri/pgloader:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-db-shared
                  key: DATABASE_URL
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              if [ ! -f /vaultwarden/db.sqlite3 ]; then
                echo "Expected source sqlite database at /vaultwarden/db.sqlite3"
                exit 1
              fi

              pgloader /vaultwarden/db.sqlite3 "$DATABASE_URL"
              echo "Vaultwarden sqlite->postgres migration job completed."
          volumeMounts:
            - name: vaultwarden-data
              mountPath: /vaultwarden
              readOnly: true
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "2", memory: "2Gi" }
      volumes:
        - name: vaultwarden-data
          persistentVolumeClaim:
            claimName: vaultwarden-data
