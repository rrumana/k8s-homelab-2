apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  labels:
    app: vaultwarden
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: vaultwarden
    spec:
      serviceAccountName: vaultwarden
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: vaultwarden
        image: harbor.rcrumana.xyz/proxy-dockerhub/vaultwarden/server:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: DOMAIN
          value: "https://vault.k8s.rcrumana.xyz"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: vaultwarden-db-shared
              key: DATABASE_URL
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: vaultwarden-data
