apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Dashboard
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Cluster:
        - GitOps Repo:
            - abbr: GIT
              href: https://github.com/rrumana/k8s-homelab-2
  services.yaml: |
    - Cluster:
        - Argo CD:
            href: https://argocd.rcrumana.xyz
            description: GitOps control plane
        - Homarr:
            href: https://homarr.rcrumana.xyz
            description: Existing dashboard
        - Uptime Kuma:
            href: https://uptime.rcrumana.xyz
            description: Status and alerting
        - Ceph Dashboard:
            href: https://ceph.rcrumana.xyz
            description: Storage operations
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
