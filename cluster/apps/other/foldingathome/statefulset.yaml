apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: foldingathome
  labels:
    app: foldingathome
spec:
  serviceName: foldingathome
  replicas: 3
  podManagementPolicy: Parallel
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: foldingathome
  template:
    metadata:
      labels:
        app: foldingathome
    spec:
      serviceAccountName: foldingathome
      terminationGracePeriodSeconds: 300
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: foldingathome
              topologyKey: kubernetes.io/hostname
      containers:
        - name: foldingathome
          image: harbor.rcrumana.xyz/proxy-dockerhub/linuxserver/foldingathome:8.5.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: web
              containerPort: 7396
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/Los_Angeles
            - name: ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: foldingathome
                  key: ACCOUNT_TOKEN
            - name: MACHINE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "6"
              memory: 4Gi
          volumeMounts:
            - name: config
              mountPath: /config
  volumeClaimTemplates:
    - metadata:
        name: config
        annotations:
          argocd.argoproj.io/sync-wave: "-20"
      spec:
        storageClassName: ceph-block
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
