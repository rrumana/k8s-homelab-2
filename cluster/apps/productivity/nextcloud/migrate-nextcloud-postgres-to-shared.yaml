# One-time migration job.
# Run before app cutover. Destination DB should be prepared and reachable.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-nextcloud-postgres-to-shared
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: postgres:17
          env:
            - name: SRC_PGHOST
              value: nextcloud-postgresql
            - name: SRC_PGPORT
              value: "5432"
            - name: SRC_PGUSER
              value: nextcloud
            - name: SRC_PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db
                  key: password
            - name: SRC_PGDATABASE
              value: nextcloud
            - name: DST_PGHOST
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-shared
                  key: host
            - name: DST_PGPORT
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-shared
                  key: port
            - name: DST_PGUSER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-shared
                  key: username
            - name: DST_PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-shared
                  key: password
            - name: DST_PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-shared
                  key: database
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              for i in $(seq 1 60); do
                pg_isready -h "$SRC_PGHOST" -p "$SRC_PGPORT" -U "$SRC_PGUSER" >/dev/null 2>&1 && break
                sleep 5
              done
              pg_isready -h "$SRC_PGHOST" -p "$SRC_PGPORT" -U "$SRC_PGUSER" >/dev/null 2>&1

              for i in $(seq 1 60); do
                pg_isready -h "$DST_PGHOST" -p "$DST_PGPORT" -U "$DST_PGUSER" >/dev/null 2>&1 && break
                sleep 5
              done
              pg_isready -h "$DST_PGHOST" -p "$DST_PGPORT" -U "$DST_PGUSER" >/dev/null 2>&1

              echo "Dumping source database..."
              export PGPASSWORD="$SRC_PGPASSWORD"
              pg_dump -h "$SRC_PGHOST" -p "$SRC_PGPORT" -U "$SRC_PGUSER" -d "$SRC_PGDATABASE" -Fc -f /tmp/nextcloud.dump

              echo "Restoring to destination database..."
              export PGPASSWORD="$DST_PGPASSWORD"
              pg_restore -h "$DST_PGHOST" -p "$DST_PGPORT" -U "$DST_PGUSER" -d "$DST_PGDATABASE" \
                --clean --if-exists --no-owner --no-privileges /tmp/nextcloud.dump

              echo "Nextcloud Postgres migration job completed."
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits:   { cpu: "2", memory: "2Gi" }
