apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-os-server
  labels:
    app: unifi-os-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi-os-server
  template:
    metadata:
      labels:
        app: unifi-os-server
    spec:
      serviceAccountName: unifi-os-server
      terminationGracePeriodSeconds: 120
      initContainers:
        - name: migrate-storage
          image: harbor.rcrumana.xyz/mirror/bitnami/os-shell:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              for dir in persistent var-log data srv var-lib-unifi var-lib-mongodb rabbitmq-ssl; do
                mkdir -p "/storage/${dir}"
              done

              copy_if_empty() {
                src="$1"
                dst="$2"
                if [ -d "$src" ] && [ -z "$(ls -A "$dst" 2>/dev/null)" ]; then
                  cp -a "${src}/." "$dst/"
                fi
              }

              copy_if_empty /old/persistent /storage/persistent
              copy_if_empty /old/var-log /storage/var-log
              copy_if_empty /old/data /storage/data
              copy_if_empty /old/srv /storage/srv
              copy_if_empty /old/var-lib-unifi /storage/var-lib-unifi
              copy_if_empty /old/var-lib-mongodb /storage/var-lib-mongodb
              copy_if_empty /old/rabbitmq-ssl /storage/rabbitmq-ssl
          volumeMounts:
            - name: storage
              mountPath: /storage
            - name: persistent
              mountPath: /old/persistent
              readOnly: true
            - name: var-log
              mountPath: /old/var-log
              readOnly: true
            - name: data
              mountPath: /old/data
              readOnly: true
            - name: srv
              mountPath: /old/srv
              readOnly: true
            - name: var-lib-unifi
              mountPath: /old/var-lib-unifi
              readOnly: true
            - name: var-lib-mongodb
              mountPath: /old/var-lib-mongodb
              readOnly: true
            - name: rabbitmq-ssl
              mountPath: /old/rabbitmq-ssl
              readOnly: true
      containers:
        - name: unifi-os-server
          image: harbor.rcrumana.xyz/mirror/lemker/unifi-os-server:2026-03-31
          imagePullPolicy: IfNotPresent
          env:
            - name: UOS_SYSTEM_IP
              value: unifi.rcrumana.xyz
          ports:
            - name: uos-ui
              containerPort: 443
              protocol: TCP
            - name: rtp
              containerPort: 5005
              protocol: TCP
            - name: aqmps
              containerPort: 5671
              protocol: TCP
            - name: speedtest
              containerPort: 6789
              protocol: TCP
            - name: inform
              containerPort: 8080
              protocol: TCP
            - name: network-app
              containerPort: 8443
              protocol: TCP
            - name: guest-https
              containerPort: 8843
              protocol: TCP
            - name: hotspot-sec
              containerPort: 8444
              protocol: TCP
            - name: hotspot-0
              containerPort: 8880
              protocol: TCP
            - name: hotspot-1
              containerPort: 8881
              protocol: TCP
            - name: hotspot-2
              containerPort: 8882
              protocol: TCP
            - name: identity-hub
              containerPort: 9543
              protocol: TCP
            - name: discovery
              containerPort: 10001
              protocol: UDP
            - name: discovery-v2
              containerPort: 10003
              protocol: UDP
            - name: site-superv
              containerPort: 11084
              protocol: TCP
            - name: stun
              containerPort: 3478
              protocol: UDP
            - name: syslog
              containerPort: 5514
              protocol: UDP
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - NET_ADMIN
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: storage
              mountPath: /persistent
              subPath: persistent
            - name: storage
              mountPath: /var/log
              subPath: var-log
            - name: storage
              mountPath: /data
              subPath: data
            - name: storage
              mountPath: /srv
              subPath: srv
            - name: storage
              mountPath: /var/lib/unifi
              subPath: var-lib-unifi
            - name: storage
              mountPath: /var/lib/mongodb
              subPath: var-lib-mongodb
            - name: storage
              mountPath: /etc/rabbitmq/ssl
              subPath: rabbitmq-ssl
            # UniFi OS runs under systemd and needs writable cgroup access.
            - name: cgroup
              mountPath: /sys/fs/cgroup
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: unifi-os-server-storage
        - name: persistent
          persistentVolumeClaim:
            claimName: unifi-os-server-persistent
        - name: var-log
          persistentVolumeClaim:
            claimName: unifi-os-server-var-log
        - name: data
          persistentVolumeClaim:
            claimName: unifi-os-server-data
        - name: srv
          persistentVolumeClaim:
            claimName: unifi-os-server-srv
        - name: var-lib-unifi
          persistentVolumeClaim:
            claimName: unifi-os-server-var-lib-unifi
        - name: var-lib-mongodb
          persistentVolumeClaim:
            claimName: unifi-os-server-var-lib-mongodb
        - name: rabbitmq-ssl
          persistentVolumeClaim:
            claimName: unifi-os-server-rabbitmq-ssl
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
