apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  dataDirHostPath: /var/lib/rook

  cephVersion:
    image: harbor.rcrumana.xyz/mirror/ceph/ceph:v20.2.0

  # Keep all Ceph traffic on the dedicated storage network so PVC reads/writes
  # do not compete with general LAN traffic.
  network:
    provider: host
    publicNetwork: "172.16.100.0/24"
    clusterNetwork: "172.16.100.0/24"

  mon:
    count: 3
    allowMultiplePerNode: false

  mgr:
    count: 2
    allowMultiplePerNode: false
    modules:
      - name: rook
        enabled: true
      - name: nfs
        enabled: false

  dashboard:
    enabled: true
    ssl: true

  placement:
    all:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

  monitoring:
    enabled: true
    # Ceph v20.2.0 has a prometheus mgr startup regression that can crash the
    # module on Rook-managed clusters. Disable Ceph-exported metrics until a
    # fixed Ceph image is available, then remove this override.
    metricsDisabled: true

  # Conservative recovery/backfill settings for 2.5Gb links.
  cephConfig:
    global:
      public_network: "172.16.100.0/24"
      cluster_network: "172.16.100.0/24"
      osd_max_backfills: "1"
      osd_recovery_max_active: "1"
      osd_recovery_sleep: "0.1"

  storage:
    useAllNodes: false
    useAllDevices: false
    nodes:
      - name: melchior-1
        devices:
          - name: /dev/disk/by-id/nvme-CT2000P310SSD8_252350935F8C
          - name: /dev/disk/by-id/nvme-CT2000P310SSD8_252350935FBF
      - name: balthasar-2
        devices:
          - name: /dev/disk/by-id/nvme-Sabrent_Rocket_Q_23CD0705089800199528
          - name: /dev/disk/by-id/nvme-ADATA_LEGEND_900_4N42210FA46C
      - name: casper-3
        devices:
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S7KHNJ0Y612649F
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S73WNJ0W944501L
