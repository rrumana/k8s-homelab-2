apiVersion: v1
kind: Service
metadata:
  name: unifi-os-server-tcp
  annotations:
    metallb.universe.tf/address-pool: default-pool
    metallb.universe.tf/allow-shared-ip: "unifi-192.168.1.235"
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.235
  selector:
    app: unifi-os-server
  ports:
    - name: uos-ui
      port: 11443
      targetPort: 443
      protocol: TCP
    - name: rtp
      port: 5005
      targetPort: 5005
      protocol: TCP
    - name: aqmps
      port: 5671
      targetPort: 5671
      protocol: TCP
    - name: speedtest
      port: 6789
      targetPort: 6789
      protocol: TCP
    - name: inform
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: network-app
      port: 8443
      targetPort: 8443
      protocol: TCP
    - name: guest-https
      port: 8843
      targetPort: 8843
      protocol: TCP
    - name: hotspot-sec
      port: 8444
      targetPort: 8444
      protocol: TCP
    - name: hotspot-0
      port: 8880
      targetPort: 8880
      protocol: TCP
    - name: hotspot-1
      port: 8881
      targetPort: 8881
      protocol: TCP
    - name: hotspot-2
      port: 8882
      targetPort: 8882
      protocol: TCP
    - name: identity-hub
      port: 9543
      targetPort: 9543
      protocol: TCP
    - name: site-superv
      port: 11084
      targetPort: 11084
      protocol: TCP
