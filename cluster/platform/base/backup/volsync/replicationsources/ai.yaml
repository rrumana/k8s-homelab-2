apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: llama-models-cache-backup
  namespace: ai
spec:
  sourcePVC: llama-models-cache
  trigger:
    schedule: "50 7 * * *"
  restic:
    copyMethod: Direct
    repository: llama-models-cache-backup-restic
    cacheCapacity: 32Gi
    cacheStorageClassName: ceph-block
    cacheAccessModes:
      - ReadWriteOnce
    pruneIntervalDays: 14
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
    retain:
      daily: 7
      weekly: 4
      monthly: 3
