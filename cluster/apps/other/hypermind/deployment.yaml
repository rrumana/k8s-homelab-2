apiVersion: apps/v1
kind: Deployment
metadata:
  name: hypermind
  labels:
    app: hypermind
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hypermind
  template:
    metadata:
      labels:
        app: hypermind
    spec:
      serviceAccountName: hypermind
      # Upstream expects host networking so Hyperswarm/DHT can bind directly.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: hypermind
          image: ghcr.io/lklynet/hypermind:v1.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
            - name: ENABLE_CHAT
              value: "true"
            - name: ENABLE_MAP
              value: "true"
            - name: ENABLE_THEMES
              value: "true"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
