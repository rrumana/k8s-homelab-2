apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valkey-cache-auth
  namespace: databases
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: valkey-cache-auth
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: apps/databases/valkey-cache-auth
        property: password
